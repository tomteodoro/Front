<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Atividades DOM</title>
  <link rel="stylesheet" href="atividades.css">
</head>
<body>

  <h2>Atividade 1 - Mudar cor do título</h2>
  <h1 id="titulo">Título da Página</h1>
  <button id="azul">Azul</button>
  <button id="vermelho">Vermelho</button>

  <hr>

  <h2>Atividade 2 - Mostrar e esconder mensagem</h2>
  <p id="mensagem">Esta é uma mensagem importante!</p>
  <button id="botaoToggle">Mostrar / Esconder</button>

  <hr>

  <h2>Atividade 3 - Contador de caracteres</h2>
  <textarea id="texto" placeholder="Digite algo..."></textarea>
  <p id="contador">Caracteres digitados: 0</p>

  <hr>

  <script src="atividades.js"></script>
</body>
</html>
